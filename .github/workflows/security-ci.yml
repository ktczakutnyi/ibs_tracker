name: Security + Quality CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  # This job verifies the project can be installed and passes baseline quality checks.
  # If this fails, we should not merge because teammates and CI users cannot reliably build/lint.
  quality-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gut-log-daily/gut-log-daily
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gut-log-daily/gut-log-daily/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Run lint checks
        run: npm run lint

  # This job handles supply-chain and dependency security checks.
  # It depends on quality-checks so we only run security scans after a healthy baseline build.
  dependency-security:
    runs-on: ubuntu-latest
    needs: quality-checks
    defaults:
      run:
        working-directory: gut-log-daily/gut-log-daily
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gut-log-daily/gut-log-daily/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies (production)
        run: npm audit --omit=dev --audit-level=high

      - name: Generate SBOM (SPDX JSON)
        run: npm sbom --omit dev > sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx
          path: gut-log-daily/gut-log-daily/sbom.spdx.json
